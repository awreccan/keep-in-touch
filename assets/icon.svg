<svg id="svg" width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#2f6df0"/>
  <!-- ranking bars: three ascending rounded bars, centered as a group -->
  <g fill="#ffffff">
    <rect x="196" y="270" width="36" height="70"  rx="12"/>
    <rect x="238" y="232" width="36" height="108" rx="12"/>
    <rect x="280" y="194" width="36" height="146" rx="12"/>
  </g>
  <!-- recurrence loop: an open circular arrow around the bars -->
  <g fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round">
    <path d="M 360 196
             A 120 120 0 1 1 256 136" />
  </g>
  <!-- arrowhead closing the loop (points into the cycle) -->
  <polygon points="256,104 296,136 250,166" fill="#ffffff"/>
</svg>